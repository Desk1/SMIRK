sampling:
  model:
    genforce_model: stylegan_celeba_partial256
  latent_space:
    use_w_space: false
    repeat_w: true
    use_z_plus_space: false
    num_layers: 14
    trunc_psi: 0.7
    trunc_layers: 8
  output_dir: output/samples
  batch_size: 100
  size: 1
  latent_dim: 512
  resolution: 256
blackbox_sample_query:
  arch_name_target: inception_resnetv1_vggface2
  target_dataset: vggface2
  output_dir: output/blackbox_attack_data
  remove_intermediate: true
  merge_only: false
  inference_only: false
surrogate_training:
  arch_name_surrogate: inception_resnetv1_casia
  query_num: 2500
  batch_size: 128
  epochs: 200
  test_surrogate: false
  output_dir: output/surrogate_model_checkpoints
  num_experts: 3
  beta: 0.9
  lambda_diversity: 10
  lambda_ce: 0.15
attack_execution:
  whitebox_attack:
    attack_mode: SMILE
    population_size: 100
    epochs: 1
    learning_rate: 0.2
  blackbox_attack:
    attack_mode: SMILE
    population_size: 100
    epochs: 1
    learning_rate: 0.2
    budget: 1
    optimizer_strategy: NGOpt
  output_dir: output/attacks
  targets:
  - 8
  load_elite_from_file: false
  elite_dir: ''
device: cuda
seed: 666
